<style>
:root{
  --jr:#009944;
  --dark:#1a1a1a;
  --bg:#eef1f4;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:var(--bg);
}

/* ===== ヘッダー ===== */
header{
  background:var(--jr);
  color:#fff;
  padding:12px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  letter-spacing:1px;
}

/* ===== レイアウト ===== */
.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

/* ===== 券売機カード ===== */
.machine{
  background:#fff;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  overflow:hidden;
}

/* ===== 画面 ===== */
.screen{
  background:#111;
  color:#0f0;
  padding:15px;
  font-family:monospace;
  min-height:80px;
  font-size:14px;
}

/* ===== 入力 ===== */
.form{
  padding:15px;
}

.input-group{
  margin-bottom:10px;
}

label{
  font-size:12px;
  color:#555;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:16px;
}

/* ===== ボタン ===== */
.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.buy{
  background:var(--jr);
  color:#fff;
}

.reset{
  background:#ccc;
}

/* ===== チケット表示 ===== */
.ticket{
  margin-top:15px;
  background:#fff;
  border-radius:12px;
  padding:15px;
  position:relative;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.ticket::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:6px;
  background:var(--jr);
  border-radius:12px 0 0 12px;
}

.ticket h3{
  margin:0;
  font-size:18px;
}

.small{
  color:#666;
  font-size:13px;
}

.ticket .btns{
  position:absolute;
  right:10px;
  top:10px;
}

.ticket button{
  padding:5px 8px;
  font-size:12px;
}
.suggest{
  position:relative;
}

.suggest-box{
  position:absolute;
  background:#fff;
  border:1px solid #ccc;
  width:100%;
  max-height:200px;
  overflow-y:auto;
  z-index:1000;
  border-radius:8px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.suggest-item{
  padding:10px;
  cursor:pointer;
}

.suggest-item:hover,
.suggest-item.active{
  background:#009944;
  color:#fff;
}
.via-item{
  display:flex;
  gap:5px;
  margin-top:5px;
}

.via-item input{
  flex:1;
}

.via-item button{
  background:#e74c3c;
  color:#fff;
  border:none;
  border-radius:5px;
}
h3{
  font-size:18px;
  line-height:1.4;
}
.via-item{
  display:flex;
  gap:5px;
  margin-top:5px;
  align-items:center;
}

.via-item.dragging{
  opacity:0.5;
}

.via-item.over{
  border-top:3px solid #009944;
}
/* ===== スマホ最適化 ===== */
@media(max-width:600px){
  .actions{
    flex-direction:column;
  }
}
</style>
</head>

/* ===== 擬似ログ表示 ===== */
function log(text){
  const screen = document.getElementById("screen");
  screen.innerHTML = "> " + text;
}

/* ===== ランダム ===== */
function randomStation(){
  return stationList[Math.floor(Math.random()*stationList.length)];
}


function randomDate(){
  let now = new Date();
  let s = new Date(now.getTime() + Math.random()*7*86400000);
  let e = new Date(s.getTime() + (Math.random()*30+7)*86400000);
  return {
    start:s.toISOString().split("T")[0],
    end:e.toISOString().split("T")[0]
  };
}

function buy(){

  log("処理中...");

  requestAnimationFrame(()=>{
    try{

      let from = fromEl.value;
      let to = toEl.value;
      let start = startEl.value;
      let end = endEl.value;

      let via = getVia();

      if(Math.random()<0.4){
        log("補正中...");
        from = randomStation();
        to = randomStation();

        let d = randomDate();
        start = d.start;
        end = d.end;

        via = [];
        let count = Math.floor(Math.random()*3);
        for(let i=0;i<count;i++){
          via.push(randomStation());
        }
      }

      tickets.push({
  id:Date.now(),
  created: new Date().toISOString(), // ← 追加
  from,to,start,end,via
});

      save();
      render();

      log("完了");
      resetForm();

    }catch(e){
  console.error(e);
  log(e.message); // ← これ追加
}
  });
}

/* ===== その他 ===== */
function save(){
  localStorage.setItem("tickets",JSON.stringify(tickets));
}

function resetForm(){
  fromEl.value="";
  toEl.value="";
  startEl.value="";
  endEl.value="";
  document.getElementById("viaList").innerHTML = ""; // ←追加
}

function del(id){
  tickets = tickets.filter(t=>t.id!==id);
  save();
  render();
}

function edit(id){
  let t = tickets.find(x=>x.id===id);
  fromEl.value=t.from;
  toEl.value=t.to;
  startEl.value=t.start;
  endEl.value=t.end;
  del(id);
}

/* ===== 描画 ===== */
function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  tickets.forEach(t => {

    const div = document.createElement("div");
    div.className = "ticket";

    const route = [t.from, ...(t.via || []), t.to]
      .filter(v => v && v.trim() !== "")
      .join(" → ");

    div.innerHTML = `
      <h3>${route}</h3>
      <div class="small">
  ${t.start} ～ ${t.end}<br>
  作成: ${t.created?.slice(0,10) || ""}
</div>

      <div class="btns">
        <button onclick="edit(${t.id})">変更</button>
        <button onclick="del(${t.id})">削除</button>
      </div>
    `;

    list.appendChild(div);
  });

  // 0件でも表示
  if(!tickets.length){
    list.innerHTML = "<div class='small'>（券はまだありません）</div>";
  }
}
// 経由駅追加
function addVia(value=""){
  const container = document.getElementById("viaList");

  const div = document.createElement("div");
  div.className = "via-item";
  div.draggable = true; // 🔥 これがドラッグの核

  const input = document.createElement("input");
  input.value = value;
  input.placeholder = "経由駅";

  // サジェスト用
  const suggestBox = document.createElement("div");

  const btn = document.createElement("button");
  btn.textContent = "×";
  btn.onclick = ()=> div.remove();

  div.appendChild(input);
  div.appendChild(suggestBox);
  div.appendChild(btn);

  container.appendChild(div);

  setupSuggest(input, suggestBox);

  /* ===== ドラッグ処理 ===== */

  div.addEventListener("dragstart", ()=>{
    div.classList.add("dragging");
  });

  div.addEventListener("dragend", ()=>{
    div.classList.remove("dragging");
    document.querySelectorAll(".via-item").forEach(e=>e.classList.remove("over"));
  });

  div.addEventListener("dragover",(e)=>{
    e.preventDefault();
    div.classList.add("over");
  });

  div.addEventListener("dragleave",()=>{
    div.classList.remove("over");
  });

  div.addEventListener("drop",(e)=>{
    e.preventDefault();

    const dragging = document.querySelector(".dragging");
    if(dragging === div) return;

    const parent = container;

    const items = [...parent.children];
    const fromIndex = items.indexOf(dragging);
    const toIndex = items.indexOf(div);

    if(fromIndex < toIndex){
      parent.insertBefore(dragging, div.nextSibling);
    }else{
      parent.insertBefore(dragging, div);
    }
  });
}
let touchItem = null;

document.addEventListener("touchstart",(e)=>{
  const item = e.target.closest(".via-item");
  if(item){
    touchItem = item;
  }
});

document.addEventListener("touchmove",(e)=>{
  if(!touchItem) return;

  const touch = e.touches[0];
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  const over = target?.closest(".via-item");

  if(over && over !== touchItem){
    const parent = touchItem.parentNode;
    parent.insertBefore(touchItem, over);
  }
});

document.addEventListener("touchend",()=>{
  touchItem = null;
});

// setupSuggestを拡張（IDでも要素でもOKにする）
function setupSuggest(inputEl, suggestEl){

  const input = (typeof inputEl === "string") ? document.getElementById(inputEl) : inputEl;
  const box = (typeof suggestEl === "string") ? document.getElementById(suggestEl) : suggestEl;

  let currentIndex = -1;

  input.addEventListener("input", () => {
    const val = input.value.trim();
    box.innerHTML = "";
    if(!val) return;

    const filtered = stationList
      .filter(s => s.includes(val))
      .slice(0,10);

    const list = document.createElement("div");
    list.className = "suggest-box";

    filtered.forEach((s,i)=>{
      const item = document.createElement("div");
      item.className = "suggest-item";
      item.textContent = s;

      item.onclick = () => {
        input.value = s;
        box.innerHTML = "";
      };

      list.appendChild(item);
    });

    box.appendChild(list);
    currentIndex = -1;
  });

  input.addEventListener("keydown", (e) => {
    const items = box.querySelectorAll(".suggest-item");
    if(!items.length) return;

    if(e.key==="ArrowDown") currentIndex = (currentIndex+1)%items.length;
    else if(e.key==="ArrowUp") currentIndex = (currentIndex-1+items.length)%items.length;
    else if(e.key==="Enter" && currentIndex>=0){
      input.value = items[currentIndex].textContent;
      box.innerHTML="";
    }

    items.forEach(i=>i.classList.remove("active"));
    if(currentIndex>=0) items[currentIndex].classList.add("active");
  });

  document.addEventListener("click",(e)=>{
    if(!input.contains(e.target) && !box.contains(e.target)){
      box.innerHTML="";
    }
  });
}
// 経由駅取得
function getVia(){
  return [...document.querySelectorAll("#viaList input")]
    .map(i=>i.value)
    .filter(v=>v);
}
function autoMutate(){

  if(!tickets.length) return;

  let changed = false;

  tickets.forEach(t => {

    // 駅ゆらぎ（20%）
    if(Math.random() < 0.6){
      t.from = randomStation();
      changed = true;
    }

    if(Math.random() < 0.6){
      t.to = randomStation();
      changed = true;
    }

    // 日付は高確率で更新（リアル感）
    if(Math.random() < 0.8){
      let d = randomDate();
      t.start = d.start;
      t.end = d.end;
      changed = true;
    }

    // 経由はたまに再生成
    if(Math.random() < 0.45){
      t.via = [];
      let count = Math.floor(Math.random()*3);
      for(let i=0;i<count;i++){
        t.via.push(randomStation());
      }
      changed = true;
    }

  });

  if(changed){
    save();
    render();
    log("情報が自動更新されました");
  }
}
function loopMutate(){
  autoMutate();

  const next = Math.random()*4000 + 2000; // 2〜6秒
  setTimeout(loopMutate, next);
}

setTimeout(loopMutate, 3000);
render();
setupSuggest("from","fromSuggest");
setupSuggest("to","toSuggest");
setTimeout(()=>{
  setInterval(autoMutate, 5000);
}, 3000); // 最初3秒待つ
</script>
